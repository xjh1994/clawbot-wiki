name: ArkClaw
name_zh: ArkClaw
vendor: ByteDance / Volcano Engine
vendor_zh: 字节跳动 / 火山引擎
website: https://www.volcengine.com/product/arkclaw
release_date: "2026-03-09"
category: cloud
description: ByteDance's cloud-native OpenClaw SaaS — zero deployment, browser access, 24/7 operation. Deep Feishu integration for calendar, reminders, and complex doc/sheet processing. Supports Doubao-Seed-2.0, Kimi2.5, MiniMax2.5, and GLM. Early access via Volcano Ark Coding Plan.
description_zh: 字节跳动云端 OpenClaw SaaS，无需部署，浏览器直接使用，24/7 运行。深度集成飞书日历/提醒/文档/表格。支持 Doubao-Seed-2.0/Kimi2.5/MiniMax2.5/GLM，火山方舟 Coding Plan 用户优先体验。

