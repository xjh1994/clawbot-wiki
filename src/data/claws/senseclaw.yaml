description: SenseTime's "Office Raccoon" (办公浣熊) integrated with OpenClaw — packaged as "Raccoon Skills" covering Excel processing, data analysis, and automated report generation. Also available as AI Box hardware (with Qujing Tech) for fully on-premise deployment.
