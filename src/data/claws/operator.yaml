name: Operator (Red Finger)
name_zh: 百度红手指 Operator
vendor: Baidu
vendor_zh: 百度
release_date: "2026-03-12"
category: other
description: Baidu's "Red Finger" — world's first mobile AI agent. Built on Baidu's ARM cloud infrastructure and VLA (vision-language-action) multimodal model. Supports cross-app operations like ride-hailing and food ordering directly from a phone.
description_zh: 百度红手指，全球首款手机端龙虾 App。基于百度 ARM 云服务和自研 VLA 多模态大模型，支持跨 App 操作打车/订外卖等，发布即秒光。

