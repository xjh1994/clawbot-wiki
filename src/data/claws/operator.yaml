notes: Mobile-native agent using Baidu cloud phones for secure execution. OpenClaw creator Peter Steinberger praised the innovation and expressed willingness to co-develop. Launch caused capacity shortages.
notes_zh: 基于百度云手机实现安全隔离执行，OpenClaw 作者公开称赞并表示愿意合作。发布即遭抢购，引发云服务扩容预警。
