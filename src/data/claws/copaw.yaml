name: CoPaw
name_zh: CoPaw
vendor: Alibaba Cloud (Tongyi Lab)
vendor_zh: 阿里云通义实验室
website: https://github.com/agentscope-ai/CoPaw
github: https://github.com/agentscope-ai/CoPaw
release_date: "2026-02-28"
category: desktop
description: Alibaba Cloud's open-source personal AI agent workstation (Apache 2.0). Supports local or cloud deployment with 3-command install, long-term memory via ReMe/PROFILE.md, and channels including DingTalk, Feishu, QQ, Discord, and iMessage.
description_zh: 阿里云通义实验室开源的个人 AI 工作站（Apache 2.0）。3 条命令本地安装，ReMe 长期记忆系统，支持钉钉/飞书/QQ/Discord/iMessage 多渠道接入，可端可云。

openclaw:
  fork_type: independent
  protocol_compat: full
  soul_md: true
  mcp_support: true
  skills_store: true
  openclaw_lag_days: null

channels:
  wechat_clawbot: "no"
  qq: "yes"
  wecom: "unknown"
  feishu: "yes"
  dingtalk: "yes"
  telegram: "unknown"
  discord: "yes"

models:
  default: Qwen
  supported: [Qwen, DeepSeek, Claude, OpenAI-compatible]
  local_model: true

deployment: both
cloud_deploy:
  - name: 阿里云 PAI-EAS
  - name: 阿里云函数计算 FC
  - name: 阿里云 ECS
  - name: Zeabur
  - name: Sealos
  - name: 腾讯云 SCF
tags: [alibaba, open-source, qwen, apache2]
verified: true
notes: Not a fork of OpenClaw — independently designed by Alibaba to be simpler and more "local + cloud" unified. Name means "Co Personal Agent Workstation" (协同个人智能体工作台).
notes_zh: 并非 OpenClaw fork，是阿里自研更简易方案。名字含义：协同个人智能体工作台（Co Personal Agent Workstation）。
last_updated: "2026-03-23"
