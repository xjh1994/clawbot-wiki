name: Tencent Lobster Butler
name_zh: 腾讯龙虾管家（电脑管家 AI 沙箱）
vendor: Tencent
vendor_zh: 腾讯
release_date: "2026-03-13"
category: other
description: AI security sandbox in Tencent PC Manager 18.0 — not a standalone OpenClaw implementation but a protection layer for all locally-running AI agents (OpenClaw, QClaw, OneClaw, LobsterAI). Controls system access, intercepts abnormal payments, prevents private file access, and supports custom sensitive path blacklists.
description_zh: 腾讯电脑管家 18.0 内置的 AI 安全沙箱，并非独立 OpenClaw 产品，而是为本地运行的各类 Agent（OpenClaw/QClaw/OneClaw/LobsterAI 等）提供安全防护层。控制系统访问、拦截异常支付、防止私有文件访问、支持敏感路径黑名单。

