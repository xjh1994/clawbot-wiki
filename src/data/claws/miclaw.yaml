description: Xiaomi's mobile-first AI agent — China's first mobile-native OpenClaw-like product. System-level phone control, 50+ packaged capabilities, deep Mi Home IoT integration (1B+ connected devices). Powered by MiMo LLM. Currently invitation-only beta on Xiaomi 17 series.
description_zh: 小米移动端 AI Agent，国内首款移动原生类 OpenClaw 产品。系统级手机控制，50+ 核心能力，深度集成 Mi Home IoT（10 亿+设备），MiMo 大模型驱动，目前仅限小米 17 系列邀请测试。

