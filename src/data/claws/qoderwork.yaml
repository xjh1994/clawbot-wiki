name: QoderWork
name_zh: QoderWork
vendor: Alibaba Cloud
vendor_zh: 阿里云
release_date: "2026-01"
category: cloud
description: Alibaba Cloud's out-of-the-box OpenClaw workspace — one of the earliest Chinese OpenClaw SaaS products (January 2026). Supports PPT generation, web content summarization, teaching demo videos, and custom Skills via DingTalk.
description_zh: 阿里云开箱即用 OpenClaw 工作空间，国内最早上线的云端龙虾产品之一（2026 年 1 月）。支持 PPT 生成、网页内容摘要、教学演示视频，通过钉钉接入自定义 Skills。

openclaw:
  fork_type: compatible
  protocol_compat: full
  soul_md: null
  mcp_support: null
  skills_store: true
  openclaw_lag_days: null

channels:
  wechat_clawbot: "no"
  qq: "no"
  wecom: "no"
  feishu: "unknown"
  dingtalk: "yes"
  telegram: "no"
  discord: "no"

models:
  default: Qwen-Coder
  supported: [Qwen-Coder, Qwen, DeepSeek-Coder]
  local_model: false

deployment: cloud
tags: [alibaba, coding, cloud, early-launch]
verified: true
notes: Launched before the OpenClaw boom peaked in March 2026. Alibaba's third OpenClaw-family product alongside CoPaw (open-source) and JVSClaw (mobile SaaS).
notes_zh: 早于 2026 年 3 月龙虾热潮爆发前上线。阿里系龙虾产品家族第三成员（另有 CoPaw 开源版、JVSClaw 手机版）。
last_updated: "2026-03-23"
