description: Storage-origin cloud from Qiniu. Known for Kodo object storage and CDN. Compute lineup includes QVM (ECS), LAS (full-stack app server with AI Agent Sandbox), and QApp (container platform). No standalone FaaS product. AI inference API supports OpenAI/Anthropic-compatible endpoints.
