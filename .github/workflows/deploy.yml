name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          KEYSTATIC_GITHUB_CLIENT_ID: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_ID }}
          KEYSTATIC_GITHUB_CLIENT_SECRET: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_SECRET }}
          KEYSTATIC_SECRET: ${{ secrets.KEYSTATIC_SECRET }}

      - name: Remove stale wrangler deploy cache
        run: rm -rf .wrangler/

      - name: Patch wrangler config with custom domain and vars
        run: |
          node -e "
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('dist/server/wrangler.json', 'utf8'));
          cfg.routes = [{ pattern: 'clawbot.wiki/*', zone_name: 'clawbot.wiki' }];
          cfg.vars = { KEYSTATIC_GITHUB_CLIENT_ID: process.env.KEYSTATIC_GITHUB_CLIENT_ID };
          fs.writeFileSync('dist/server/wrangler.json', JSON.stringify(cfg));
          "
        env:
          KEYSTATIC_GITHUB_CLIENT_ID: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_ID }}

      - name: Deploy Worker (SSR + static assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: dist/server
          command: deploy

      - name: Set Worker secrets
        run: |
          printf '{"KEYSTATIC_GITHUB_CLIENT_SECRET":"%s","KEYSTATIC_SECRET":"%s"}' \
            "$KEYSTATIC_GITHUB_CLIENT_SECRET" "$KEYSTATIC_SECRET" > /tmp/ks-secrets.json
          cd dist/server && npx wrangler secret:bulk /tmp/ks-secrets.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KEYSTATIC_GITHUB_CLIENT_SECRET: ${{ secrets.KEYSTATIC_GITHUB_CLIENT_SECRET }}
          KEYSTATIC_SECRET: ${{ secrets.KEYSTATIC_SECRET }}
