backend:
  name: github
  repo: xjh1994/clawbot-wiki
  branch: main
  base_url: https://cms-auth.clawbot.wiki
  auth_scope: public_repo

locale: zh_Hans

media_folder: public/logos
public_folder: /logos

collections:
  - name: claws
    label: Claw 产品库
    label_singular: Claw
    folder: src/data/claws
    create: true
    slug: "{{slug}}"
    extension: yaml
    format: yaml
    identifier_field: name
    summary: "{{name}} — {{vendor}}"
    fields:
      - { label: "产品名（英文）", name: name, widget: string }
      - { label: "产品名（中文）", name: name_zh, widget: string }
      - { label: "厂商（英文）", name: vendor, widget: string }
      - { label: "厂商（中文）", name: vendor_zh, widget: string }
      - { label: "官网", name: website, widget: string, required: false }
      - { label: "GitHub 地址", name: github, widget: string, required: false }
      - { label: "发布日期", name: release_date, widget: string, required: false }
      - label: 分类
        name: category
        widget: select
        options: [desktop, cloud, enterprise, open-source, embedded, other]
      - { label: "产品描述（英文）", name: description, widget: text }
      - { label: "产品描述（中文）", name: description_zh, widget: text }
      - label: OpenClaw 兼容性
        name: openclaw
        widget: object
        fields:
          - { label: 分支类型, name: fork_type, widget: select, options: [fork, compatible, independent, unrelated, unknown] }
          - { label: 协议兼容度, name: protocol_compat, widget: select, options: [full, partial, none, unknown] }
          - { label: 支持 SOUL.md, name: soul_md, widget: boolean, required: false }
          - { label: 支持 MCP, name: mcp_support, widget: boolean, required: false }
          - { label: 技能商店, name: skills_store, widget: boolean, required: false }
          - { label: 落后天数, name: openclaw_lag_days, widget: number, required: false }
      - label: 渠道支持
        name: channels
        widget: object
        fields:
          - { label: 微信 ClawBot, name: wechat_clawbot, widget: select, options: [yes, no, partial, unknown] }
          - { label: QQ, name: qq, widget: select, options: [yes, no, partial, unknown] }
          - { label: 企业微信, name: wecom, widget: select, options: [yes, no, partial, unknown] }
          - { label: 飞书, name: feishu, widget: select, options: [yes, no, partial, unknown] }
          - { label: 钉钉, name: dingtalk, widget: select, options: [yes, no, partial, unknown] }
          - { label: Telegram, name: telegram, widget: select, options: [yes, no, partial, unknown] }
          - { label: Discord, name: discord, widget: select, options: [yes, no, partial, unknown] }
      - label: 模型支持
        name: models
        widget: object
        fields:
          - { label: 默认模型, name: default, widget: string, required: false }
          - { label: 支持模型列表, name: supported, widget: list, required: false }
          - { label: 支持本地模型, name: local_model, widget: boolean, required: false }
      - { label: 部署方式, name: deployment, widget: select, options: [local, cloud, both, other] }
      - { label: 标签, name: tags, widget: list, required: false }
      - { label: 备注（英文）, name: notes, widget: text, required: false }
      - { label: 备注（中文）, name: notes_zh, widget: text, required: false }
      - { label: 已验证, name: verified, widget: boolean, default: false }
      - { label: 最后更新, name: last_updated, widget: string }
